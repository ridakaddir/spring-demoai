server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        # Bind to 0.0.0.0, not the OTel receiver's default localhost — otherwise the
        # published ports connect but get reset ("immediate disconnect" / EOF) because
        # nothing listens on the container's external interface.
        http:
          endpoint: '0.0.0.0:4318'
        grpc:
          endpoint: '0.0.0.0:4317'

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
