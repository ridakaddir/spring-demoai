apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090   # compose service name
    isDefault: true
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200        # compose service name
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100         # compose service name
    jsonData:
      # Turn the OTLP trace_id (stored as Loki structured metadata) into a
      # click-through link to the trace in Tempo.
      derivedFields:
        - name: TraceID
          matcherType: label
          matcherRegex: trace_id
          datasourceUid: tempo
          url: '${__value.raw}'
