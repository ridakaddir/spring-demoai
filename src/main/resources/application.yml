spring:
  application:
    name: demoai
  docker:
    compose:
      lifecycle-management: start-only
      profiles:
        active: full          # normal run: also start ollama + tempo + prometheus + grafana
  flyway:
    # Spring Modulith's JDBC starter creates its own event_publication table,
    # so on the very first run Flyway finds a non-empty "public" schema without a
    # history table. Baseline it instead of failing. baseline-version: 0 keeps
    # V1 (version 1) pending so the demo migration still applies.
    baseline-on-migrate: true
    baseline-version: 0
  ai:
    ollama:
      init:
        pull-model-strategy: when-missing
      chat:
        model: llama3.2
        temperature: 0.7

# Observability, all via OTLP into the Grafana stack:
#   traces  -> Tempo (4318), metrics -> Prometheus/Grafana (scrape), logs -> Loki (3100).
# Spring AI's gen_ai.* observations (chat spans + token-usage metrics) and
# Spring Modulith's module-boundary spans activate automatically from the
# ObservationRegistry once this block is present. Prompt/completion content
# capture is left OFF (spring.ai.chat.observations.log-* default to false).
# OTLP log export auto-installs the OpenTelemetry Logback appender and injects
# trace_id/span_id into every log record, so Loki logs correlate to Tempo traces.
management:
  tracing:
    sampling:
      probability: 1.0          # export 100% of traces (default is 0.1)
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces   # Tempo OTLP/HTTP receiver
    logging:
      export:
        otlp:
          endpoint: http://localhost:3100/otlp/v1/logs  # Loki OTLP log receiver
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  prometheus:
    metrics:
      export:
        enabled: true
        